# ---------------------------------------------------------------------------
# Scenario: Oil Price War & Glut
#
# Inspired by: 2014-2016 OPEC vs US shale price war.
# Low-cost Gulf producers flood the market to defend market share, crushing
# high-cost US shale producers into bankruptcy. Demand is highly inelastic
# (people still drive). The glut collapses price below breakeven for shale,
# triggering waves of bankruptcies. Eventually the market rebalances as
# shale exits and OPEC discipline returns.
#
# Supplier asymmetry is the core mechanic here:
#   gulf_producer: cost=0.25 (Saudi Aramco-type), maintains high output
#   shale_producer: cost=0.65 (fracking break-even), exits aggressively
#
# Expected dynamics:
#   - r0: OPEC opens the taps → stock_shock surplus
#   - Price slides; shale producers start cutting within 3-4 rounds
#   - Shale bankruptcies cascade (rounds 8-15)
#   - Price bottoms; gulf producers keep producing profitably
#   - r30: output discipline restores → supply cut → price recovery
#   - Shale restarts cautiously at higher prices
# ---------------------------------------------------------------------------

seed: 2014
rounds: 55

markets:
  crude_oil:
    initial_price: 1.00          # normalised; think ~$100/barrel
    initial_stock: 6000          # global buffer (weeks of demand)
    production_cost: 0.45        # weighted blended cost

    price_algorithm:
      type: stock_based
      target_stock_days: 6       # oil markets run lean (strategic reserves aside)
      elasticity: 0.15           # very inelastic commodity; slow demand response
      demand_window: 6
      min_price: 0.20            # floor: below this even OPEC hurts
      max_price: 4.00

suppliers:
  # Gulf / OPEC-type: ultra-low cost, strategy is market share, not margin
  - id: gulf_producer
    count: 3
    market: crude_oil
    production_cost: 0.16        # sovereign producers; cost ≈ lifting cost only
    initial_production_rate: 350  # 3×350=1050/round
    production_lag: 2            # can open/close taps quickly
    max_ramp_up: 0.12
    max_ramp_down: 0.08          # reluctant to cut — market share strategy
    bankruptcy_threshold: 40     # sovereign wealth fund; essentially never goes bankrupt
    restart_rate: 100
    restart_margin: 1.05         # re-enters at almost any margin
    min_production_rate: 200     # strategic floor; never fully stops
    rules:
      - condition: "own_pipeline_rounds > 4"
        action: maintain
        adjustment_factor: 0.0
        label: "pipeline loaded"
      # Gulf strategy: ramp when price is acceptable OR to crowd out rivals
      - condition: "margin > 2.0"
        action: increase_production
        adjustment_factor: 0.10
        label: "high margin — pump more"
      - condition: "margin > 1.5 and stock_ratio < 1.5"
        action: increase_production
        adjustment_factor: 0.08
        label: "good margin + not yet glutted — expand"
      - condition: "stock_ratio < 0.8"
        action: increase_production
        adjustment_factor: 0.05
        label: "market tight — fill it"
      # Below own (very low) cost: trim slightly but don't panic
      - condition: "margin < 1.0"
        action: decrease_production
        adjustment_factor: -0.06
        label: "below lifting cost — reluctant trim"
      - condition: "stock_ratio > 3.0"
        action: decrease_production
        adjustment_factor: -0.05
        label: "extreme glut — modest cut"

  # US Shale / high-cost producers: leveraged, fast ramp, fast bust
  - id: shale_producer
    count: 8
    market: crude_oil
    production_cost: 0.65        # fracking break-even (well services, debt)
    initial_production_rate: 80  # 8×80=640/round; total supply=1690, demand≈1200
    production_lag: 3            # rigs can be mobilised / stacked in ~3 months
    max_ramp_up: 0.18            # highly scalable (drill more wells)
    max_ramp_down: 0.50          # can stack rigs fast
    bankruptcy_threshold: 4      # leveraged; few quarters of losses = chapter 11
    restart_rate: 10             # modest restart when prices recover
    restart_margin: 1.55         # needs solid price to justify new well capex
    min_production_rate: 5       # minimum: keep existing wells producing
    rules:
      - condition: "consecutive_loss_rounds >= 3"
        action: decrease_production
        adjustment_factor: -0.50
        label: "cash burn accelerating — stack rigs immediately"
      - condition: "own_pipeline_rounds > 5"
        action: maintain
        adjustment_factor: 0.0
        label: "pipeline loaded"
      - condition: "margin > 2.2 and stock_ratio < 1.2"
        action: increase_production
        adjustment_factor: 0.18
        label: "bonanza price + tight market — drill baby drill"
      - condition: "margin > 1.6 and stock_ratio < 1.5"
        action: increase_production
        adjustment_factor: 0.12
        label: "good returns — ramp rigs"
      - condition: "margin > 1.2"
        action: increase_production
        adjustment_factor: 0.06
        label: "profitable — steady growth"
      - condition: "margin < 1.05"
        action: decrease_production
        adjustment_factor: -0.40
        label: "near breakeven — cut fast (leveraged)"
      - condition: "stock_ratio > 2.0"
        action: decrease_production
        adjustment_factor: -0.20
        label: "glut — cut"

# ---------------------------------------------------------------------------
# Consumers: 800 agents
# Highly inelastic demand — people must fuel cars, heat homes
# ---------------------------------------------------------------------------
consumers:
  size: 800

  agent_types:

    # --- REFINERS (30%) — must buy to keep refineries running ---------------
    - id: refiner
      proportion: 0.30
      mode: deterministic
      base_quantity: 1.8
      rules:
        - condition: "stock_ratio < 0.5"
          action: buy_more
          quantity_factor: 2.5
          label: "critical supply gap — buy at market"
        - condition: "stock_ratio < 0.9"
          action: buy_more
          quantity_factor: 1.6
          label: "below safety buffer — top up"
        - condition: "price_change_pct < -15"
          action: buy_more
          quantity_factor: 1.4
          label: "prices falling — build strategic inventory"
        - condition: "price_change_pct > 20"
          action: buy_less
          quantity_factor: 0.85
          label: "margin pressure at high crude — modest cut"

    # --- TRANSPORT COMPANIES (25%) — fuel is unavoidable -------------------
    - id: transport_buyer
      proportion: 0.25
      mode: deterministic
      base_quantity: 1.2
      rules:
        - condition: "price_change_pct > 30"
          action: buy_less
          quantity_factor: 0.75
          label: "fuel cost crisis — optimise routes, cut usage"
        - condition: "price_change_pct < -20"
          action: buy_more
          quantity_factor: 1.3
          label: "cheap fuel — stock up"
        - condition: "price_change_pct > 5"
          action: no_change
          quantity_factor: 1.0
          label: "inelastic — no choice but to pay"

    # --- PETROCHEMICAL / INDUSTRIAL (20%) ----------------------------------
    - id: petrochemical
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 25"
          action: buy_less
          quantity_factor: 0.65
          label: "feedstock too expensive — scale back production"
        - condition: "price_change_pct > 10"
          action: buy_less
          quantity_factor: 0.85
          label: "margin compression — trim"
        - condition: "price_change_pct < -10"
          action: buy_more
          quantity_factor: 1.3
          label: "cheap feedstock — ramp production"
        - condition: "stock_ratio < 0.7"
          action: buy_more
          quantity_factor: 1.5
          label: "shortage risk — secure supply"

    # --- RETAIL / CONSUMER (25%) — most inelastic segment -----------------
    - id: retail_consumer
      proportion: 0.25
      mode: stochastic
      base_quantity: 0.9
      stochastic_actions:
        - action: no_change
          weight: 0.55
          quantity_factor: 1.0
        - action: buy_less
          weight: 0.25
          quantity_factor: 0.85
        - action: buy_more
          weight: 0.15
          quantity_factor: 1.1
        - action: hold
          weight: 0.05
          quantity_factor: 0.0

shocks:
  - round: 0
    type: stock_shock
    market: crude_oil
    delta_pct: 35.0
    description: "OPEC strategy shift: members pump at full capacity — global glut"

  - round: 2
    type: price_shock
    market: crude_oil
    delta_pct: -25.0
    description: "Futures markets reprice on oversupply signals"

  - round: 28
    type: stock_shock
    market: crude_oil
    delta_pct: -25.0
    description: "OPEC+ cuts agreed: members reduce output — supply tightens"

  - round: 35
    type: price_shock
    market: crude_oil
    delta_pct: 15.0
    description: "Geopolitical tension: Middle East risk premium returns"
