# ---------------------------------------------------------------------------
# Scenario: Semiconductor Shortage
#
# Inspired by: 2020-2022 global chip shortage.
# COVID plant closures drain inventories just as work-from-home electronics
# demand explodes. Fabs have 8-round production lags (≈18 months in reality)
# and can only ramp capacity 5% per round. The mismatch creates years of
# undersupply, then a massive inventory correction as overordering unwinds.
#
# Expected dynamics:
#   - Immediate stockout (rounds 0-3)
#   - Prices hit ceiling; demand destruction in non-critical segments
#   - Automotive OEMs halt production lines (buy_less at ceiling prices)
#   - Fabs slowly ramp — supply arrives 8 rounds after decision
#   - Round 15+: overcorrected orders start arriving → glut
#   - Speculative inventory buildup unwinds; price collapses
#   - Small fabs go bankrupt in the glut; large fabs weather it
# ---------------------------------------------------------------------------

seed: 2020
rounds: 120

markets:
  chips:
    initial_price: 1.00
    initial_stock: 1800          # lean just-in-time inventory (~2 rounds)
    production_cost: 0.55        # capital-intensive but high-volume

    price_algorithm:
      type: stock_based
      target_stock_days: 8       # JIT: industry keeps very lean inventory
      elasticity: 0.20           # demand is sticky — captive supply chains
      demand_window: 5           # slow-moving average; fabs plan on trends
      min_price: 0.52            # floor above mega_fab cost (0.50) so they never go bankrupt
      max_price: 6.00            # ceiling: extreme scarcity in crisis

suppliers:
  # Tier-1 mega-fabs (think TSMC, Samsung): massive output, glacial ramp
  - id: mega_fab
    count: 2
    market: chips
    production_cost: 0.50        # scale economies; lowest cost
    initial_production_rate: 400  # 2×400=800/round baseline
    production_lag: 8            # 18-month fab-to-market cycle
    max_ramp_up: 0.015           # cleanrooms and lithography tools take years; very slow
    max_ramp_down: 0.12          # capital costs make idling painful, but must cut
    bankruptcy_threshold: 50     # sovereign wealth + gov subsidies; essentially never fails
    restart_rate: 80
    restart_margin: 0.75         # re-enters at 75% margin — strategic capacity, not profit-driven
    min_production_rate: 50      # skeleton crew only; keeps node alive for next upcycle
    rules:
      # Glut detection FIRST — a fab pumping into a glutted market hurts everyone including itself
      - condition: "stock_ratio > 2.0"
        action: decrease_production
        adjustment_factor: -0.10
        label: "significant oversupply — cut to stabilise market"
      - condition: "stock_ratio > 1.5"
        action: decrease_production
        adjustment_factor: -0.05
        label: "market building surplus — ease back"
      # Only ramp when both margin AND market tightness justify it
      - condition: "margin > 2.5 and stock_ratio < 0.5"
        action: increase_production
        adjustment_factor: 0.04
        label: "crisis + huge margin — max ramp"
      - condition: "margin > 1.5 and stock_ratio < 1.0"
        action: increase_production
        adjustment_factor: 0.03
        label: "strong margin + undersupplied — expand"
      - condition: "margin > 1.2 and stock_ratio < 1.3"
        action: increase_production
        adjustment_factor: 0.02
        label: "healthy margin + not oversupplied — steady expansion"
      - condition: "margin < 1.0"
        action: decrease_production
        adjustment_factor: -0.10
        label: "below cost — trim"

  # Tier-2 specialty fabs (mature nodes, automotive chips, power semis)
  - id: specialty_fab
    count: 5
    market: chips
    production_cost: 0.65        # older nodes; higher cost per unit
    initial_production_rate: 100  # 5×100=500/round
    production_lag: 6
    max_ramp_up: 0.08
    max_ramp_down: 0.20
    bankruptcy_threshold: 8
    restart_rate: 12
    restart_margin: 1.30
    min_production_rate: 10
    rules:
      - condition: "consecutive_loss_rounds >= 5"
        action: decrease_production
        adjustment_factor: -0.20
        label: "sustained losses — emergency cut"
      - condition: "stock_ratio > 2.0"
        action: decrease_production
        adjustment_factor: -0.18
        label: "significant glut — cut hard"
      - condition: "stock_ratio > 1.5"
        action: decrease_production
        adjustment_factor: -0.10
        label: "market surplus — pull back"
      - condition: "margin > 3.0 and stock_ratio < 0.5"
        action: increase_production
        adjustment_factor: 0.08
        label: "extreme premium + crisis — max ramp"
      - condition: "margin > 2.0 and stock_ratio < 1.0"
        action: increase_production
        adjustment_factor: 0.06
        label: "strong signal + undersupplied — expand"
      - condition: "margin > 1.3 and stock_ratio < 1.3"
        action: increase_production
        adjustment_factor: 0.04
        label: "profitable + not oversupplied"
      - condition: "margin < 1.05"
        action: decrease_production
        adjustment_factor: -0.18
        label: "near breakeven — cut"

# ---------------------------------------------------------------------------
# Consumers: 900 agents
# Total baseline supply ≈ 1300/round, demand ≈ 900/round
# Demand surges post-shock to ~1200-1400 (hoarding + boom)
# ---------------------------------------------------------------------------
consumers:
  size: 900

  agent_types:

    # --- AUTOMOTIVE OEMs (20%) ----------------------------------------------
    # Must have chips to run assembly lines. Extremely inelastic.
    # But at extreme prices, pause production rather than bleed cash.
    - id: automotive_oem
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.5          # large per-unit volume requirement
      rules:
        - condition: "stock_ratio < 0.4"
          action: buy_more
          quantity_factor: 2.5
          label: "critical shortage — secure any available supply"
        - condition: "stock_ratio < 0.8"
          action: buy_more
          quantity_factor: 1.8
          label: "below safety stock — top up"
        - condition: "stock_ratio > 2.0"
          action: buy_less
          quantity_factor: 0.55
          label: "ample supply — cancel excess orders, draw down buffer"
        - condition: "price_change_pct > 40 and stock_ratio > 0.8"
          action: buy_less
          quantity_factor: 0.6
          label: "production pause: price unsustainable"
        - condition: "price_change_pct < -10 and stock_ratio < 1.5"
          action: buy_more
          quantity_factor: 1.4
          label: "price easing + not oversupplied — rebuild buffer"

    # --- CONSUMER ELECTRONICS (25%) ----------------------------------------
    # Phones, laptops — demand surged in WFH boom
    - id: consumer_electronics
      proportion: 0.25
      mode: deterministic
      base_quantity: 1.2
      rules:
        - condition: "price_change_pct > 10 and stock_ratio < 1.0"
          action: buy_more
          quantity_factor: 1.8
          label: "fear of shortage — secure allocation"
        - condition: "price_change_pct > 20"
          action: buy_less
          quantity_factor: 0.75
          label: "margin squeeze: cut components plan"
        - condition: "price_change_pct > 30"
          action: buy_less
          quantity_factor: 0.50
          label: "severe: redesign or delay product"
        - condition: "stock_ratio > 2.0"
          action: buy_less
          quantity_factor: 0.70
          label: "inventory building up — draw down"

    # --- INDUSTRIAL / FACTORY AUTOMATION (20%) -----------------------------
    # Can defer capex; reduces orders when expensive
    - id: industrial_buyer
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 15"
          action: buy_less
          quantity_factor: 0.60
          label: "defer capital projects at high prices"
        - condition: "price_change_pct > 30"
          action: buy_less
          quantity_factor: 0.30
          label: "freeze capex"
        - condition: "price_change_pct < -15 and stock_ratio > 1.2"
          action: buy_more
          quantity_factor: 1.5
          label: "prices normalising — resume projects"
        - condition: "stock_ratio < 0.6"
          action: buy_more
          quantity_factor: 1.3
          label: "shortage risk — secure supply"

    # --- SPECULATORS / TRADERS (20%) ----------------------------------------
    # Spot market traders buying to resell; amplify the cycle
    - id: spot_trader
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 5 and stock_ratio < 1.0"
          action: buy_more
          quantity_factor: 3.0
          label: "scarcity + uptrend — hoard to resell"
        - condition: "price_change_pct > 2"
          action: buy_more
          quantity_factor: 1.8
          label: "uptrend — accumulate"
        - condition: "stock_ratio > 2.5"
          action: buy_less
          quantity_factor: 0.20
          label: "severe glut — dump and exit market"
        - condition: "stock_ratio > 1.8"
          action: buy_less
          quantity_factor: 0.40
          label: "glut — dump inventory"
        - condition: "price_change_pct < -8"
          action: buy_less
          quantity_factor: 0.30
          label: "price falling — liquidate"

    # --- STARTUPS / SMALL MAKERS (15%) -------------------------------------
    - id: small_maker
      proportion: 0.15
      mode: stochastic
      base_quantity: 0.6
      stochastic_actions:
        - action: buy_more
          weight: 0.30
          quantity_factor: 1.4
        - action: buy_less
          weight: 0.35
          quantity_factor: 0.65
        - action: hold
          weight: 0.20
          quantity_factor: 0.0
        - action: no_change
          weight: 0.15
          quantity_factor: 1.0

shocks:
  - round: 0
    type: stock_shock
    market: chips
    delta_pct: -55.0
    description: "COVID lockdowns: fab closures drain pipeline — 55% inventory destruction"

  - round: 3
    type: price_shock
    market: chips
    delta_pct: 30.0
    description: "WFH demand explosion: electronics boom hits market"

  - round: 18
    type: cost_shock
    market: chips
    delta_pct: 6.0
    description: "Energy & rare-gas costs nudge up (specialty fabs more exposed than mega-fabs)"

  - round: 50
    type: stock_shock
    market: chips
    delta_pct: -30.0
    description: "Obsolescence write-down: prior-gen node chips scrapped as foundries transition to N3"

  - round: 68
    type: price_shock
    market: chips
    delta_pct: 55.0
    description: "AI/LLM boom: GPU and inference chip demand explodes — new supercycle begins"
