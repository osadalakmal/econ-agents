# ---------------------------------------------------------------------------
# Scenario: Rice price shock with supplier response lag
#
# A 25% price shock hits in round 0 (supply chain disruption).
# Consumers respond immediately; suppliers ramp up production but their
# output only reaches the market after their configured lag.
# A secondary stock destruction event (flood) hits in round 6.
# We run 20 rounds to observe the full cycle back toward equilibrium.
# ---------------------------------------------------------------------------

seed: 42
rounds: 20

# ---------------------------------------------------------------------------
# Market: initial state + price-setting algorithm
# ---------------------------------------------------------------------------
markets:
  rice:
    initial_price: 1.00       # normalised baseline price
    initial_stock: 5000       # units in warehouse at start
    production_cost: 0.65     # blended cost baseline (informational)

    price_algorithm:
      type: stock_based
      # Target buffer: 10 rounds of average demand
      # At 1000 consumers buying ~1 unit each, avg demand ≈ 1000/round
      # → target stock = 10 000 units
      target_stock_days: 10
      elasticity: 0.25        # price sensitivity to stock imbalance
      demand_window: 3        # average demand over last N rounds
      min_price: 0.20
      max_price: 4.00

# ---------------------------------------------------------------------------
# Suppliers — rational producers with different cost structures and lags
# ---------------------------------------------------------------------------
suppliers:

  - id: large_producer
    count: 2
    market: rice
    production_cost: 0.60     # efficient; comfortable margins at baseline
    initial_production_rate: 300   # 300 units/round each → 600 total
    production_lag: 5         # 5 rounds from decision to market arrival
    max_ramp_up: 0.10         # max 10% rate increase per round
    max_ramp_down: 0.20       # can cut 20% per round if margin collapses
    rules:
      # Own pipeline caution: if this supplier already has >lag+2 rounds queued,
      # pipeline is loaded — don't add more until it clears.
      - condition: "own_pipeline_rounds > 7"
        action: maintain
        adjustment_factor: 0.0
        label: "own pipeline full — hold rate"
      # Ramp if price is good AND market is short
      - condition: "margin > 2.0 and stock_ratio < 1.2"
        action: increase_production
        adjustment_factor: 0.10
        label: "strong margin + undersupplied — ramp"
      - condition: "margin > 1.5 and stock_ratio < 1.5"
        action: increase_production
        adjustment_factor: 0.05
        label: "healthy margin — moderate ramp"
      - condition: "margin > 1.15 and stock_ratio < 1.0"
        action: increase_production
        adjustment_factor: 0.02
        label: "thin margin + shortage — cautious expansion"
      - condition: "margin < 1.0"
        action: decrease_production
        adjustment_factor: -0.18
        label: "below cost — cut hard"
      - condition: "margin < 1.08"
        action: decrease_production
        adjustment_factor: -0.08
        label: "barely profitable — trim"
      - condition: "stock_ratio > 2.0"
        action: decrease_production
        adjustment_factor: -0.10
        label: "glut building — pull back"

  - id: small_producer
    count: 5
    market: rice
    production_cost: 0.78     # less efficient; exits market sooner
    initial_production_rate: 80    # 80 units/round each → 400 total
    production_lag: 2         # smaller operations, faster to respond
    max_ramp_up: 0.15         # nimble but not unconstrained
    max_ramp_down: 0.40
    rules:
      # Own pipeline caution: lag=2, so >4 rounds queued means well ahead
      - condition: "own_pipeline_rounds > 4"
        action: maintain
        adjustment_factor: 0.0
        label: "own pipeline full — hold rate"
      - condition: "margin > 1.8 and stock_ratio < 1.2"
        action: increase_production
        adjustment_factor: 0.14
        label: "strong incentive + shortage — fast ramp"
      - condition: "margin > 1.3 and stock_ratio < 1.5"
        action: increase_production
        adjustment_factor: 0.07
        label: "good margin — moderate ramp"
      - condition: "margin < 1.05"
        action: decrease_production
        adjustment_factor: -0.35
        label: "unprofitable — cut sharply"
      - condition: "stock_ratio > 2.0"
        action: decrease_production
        adjustment_factor: -0.20
        label: "glut — pull back hard"
      - condition: "margin < 1.2 and stock_ratio > 1.5"
        action: decrease_production
        adjustment_factor: -0.15
        label: "oversupplied and thin — cautious cut"

# ---------------------------------------------------------------------------
# Consumers — 1000 agents with heterogeneous response logic
#
# Baseline: at normal price, total demand ≈ 1000 units/round
# Total supplier output at baseline: 2×300 + 5×80 = 1000 units/round
# → system starts at rough equilibrium
# ---------------------------------------------------------------------------
consumers:
  size: 1000

  agent_types:

    # --- HOARDERS (20%) ---------------------------------------------------
    # Panic-buy on any price rise; expect further increases.
    - id: hoarder
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 15 or stock_ratio < 0.5"
          action: buy_more
          quantity_factor: 3.0
          label: "panic hoard: big spike or severe shortage"
        - condition: "price_change_pct > 8"
          action: buy_more
          quantity_factor: 2.0
          label: "aggressive hoard: significant spike"
        - condition: "price_change_pct > 2"
          action: buy_more
          quantity_factor: 1.4
          label: "light hoard: any notable increase"
        - condition: "price_change_pct < -5"
          action: buy_less
          quantity_factor: 0.7
          label: "drawdown: prices falling, use inventory"

    # --- GOVERNMENT TRUSTERS (20%) ----------------------------------------
    # Believe authorities will intervene; cut purchases while waiting.
    - id: government_truster
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 15"
          action: buy_less
          quantity_factor: 0.25
          label: "sharp cutback: trusting imminent intervention"
        - condition: "price_change_pct > 5"
          action: buy_less
          quantity_factor: 0.55
          label: "moderate cutback: expecting normalisation"
        - condition: "price_change_pct > 0"
          action: hold
          quantity_factor: 0.0
          label: "hold: wait and see"
        - condition: "price_change_pct < -8"
          action: buy_more
          quantity_factor: 1.3
          label: "restock: price normalising"

    # --- BUDGET CONSTRAINED (20%) -----------------------------------------
    # Fixed income; mechanically reduce purchases when price rises.
    - id: budget_constrained
      proportion: 0.20
      mode: deterministic
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 20"
          action: buy_less
          quantity_factor: 0.30
          label: "severe cutback: cannot afford"
        - condition: "price_change_pct > 10"
          action: buy_less
          quantity_factor: 0.55
          label: "meaningful cutback"
        - condition: "price_change_pct > 3"
          action: buy_less
          quantity_factor: 0.80
          label: "mild cutback"
        - condition: "price_change_pct < -5"
          action: buy_more
          quantity_factor: 1.15
          label: "restock when affordable"

    # --- ADAPTIVE / MIXED (15%) -------------------------------------------
    # Has a panic rule for extreme shocks; otherwise stochastic.
    - id: adaptive
      proportion: 0.15
      mode: mixed
      base_quantity: 1.0
      rules:
        - condition: "price_change_pct > 25 or stock_ratio < 0.3"
          action: buy_more
          quantity_factor: 2.5
          label: "crisis mode: extreme shock"
        - condition: "price_change_pct < -15"
          action: buy_more
          quantity_factor: 1.5
          label: "restock: sharp price fall"
      stochastic_actions:
        - action: buy_more
          weight: 0.25
          quantity_factor: 1.3
        - action: buy_less
          weight: 0.35
          quantity_factor: 0.75
        - action: hold
          weight: 0.25
          quantity_factor: 0.0
        - action: no_change
          weight: 0.15
          quantity_factor: 1.0

    # --- PURE RANDOM (25%) ------------------------------------------------
    - id: random_actor
      proportion: 0.25
      mode: stochastic
      base_quantity: 1.0
      stochastic_actions:
        - action: buy_more
          weight: 0.28
          quantity_factor: 1.3
        - action: buy_less
          weight: 0.38
          quantity_factor: 0.70
        - action: hold
          weight: 0.20
          quantity_factor: 0.0
        - action: no_change
          weight: 0.14
          quantity_factor: 1.0

# ---------------------------------------------------------------------------
# Shocks — exogenous events at specific rounds
# ---------------------------------------------------------------------------
shocks:
  - round: 0
    type: price_shock
    market: rice
    delta_pct: 25.0
    description: "Supply chain disruption: +25% price shock"

  - round: 6
    type: stock_shock
    market: rice
    delta_pct: -20.0
    description: "Regional flood: 20% of warehouse stock destroyed"

  - round: 12
    type: cost_shock
    market: rice
    delta_pct: -10.0
    description: "Fuel subsidy: production costs down 10%"
